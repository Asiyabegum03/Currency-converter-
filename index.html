<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #007bff;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #0056b3;
    }
    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #28a745;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Currency Converter</h1>
    
    <input type="number" id="amount" placeholder="Enter amount" value="1000">
    
    <select id="fromCurrency">
      <option value="ALL">ALL - Albanian Lek</option>
      <option value="INR" selected>INR - Indian Rupee</option>
      <option value="USD">USD - US Dollar</option>
      <option value="EUR">EUR - Euro</option>
      <option value="GBP">GBP - British Pound</option>
      <!-- You can add more currencies here if you want -->
    </select>
    
    <select id="toCurrency">
      <option value="ALL">ALL - Albanian Lek</option>
      <option value="INR">INR - Indian Rupee</option>
      <option value="USD" selected>USD - US Dollar</option>
      <option value="EUR">EUR - Euro</option>
      <option value="GBP">GBP - British Pound</option>
    </select>
    
    <button onclick="convertCurrency()">Convert</button>
    
    <div id="result"></div>
  </div>

  <script>
    async function convertCurrency() {
      const amount = document.getElementById('amount').value;
      const from = document.getElementById('fromCurrency').value;
      const to = document.getElementById('toCurrency').value;
      const resultDiv = document.getElementById('result');

      if (!amount || amount <= 0) {
        resultDiv.innerHTML = "Please enter a valid amount";
        return;
      }

      try {
        // Free live exchange rate API (no key needed)
        const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
        const data = await response.json();
        
        const rate = data.rates[to];
        const converted = (amount * rate).toFixed(2);
        
        resultDiv.innerHTML = `${amount} ${from} = <strong>${converted} ${to}</strong>`;
      } catch (error) {
        resultDiv.innerHTML = "Error fetching rates. Try again later.";
      }
    }
  </script>
</body>
</html>
